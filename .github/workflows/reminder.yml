jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Message
        run: |
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.CHAT_ID }}" \
            -d text="🔔 GitHub Actions সফলভাবে কাজ করছে!")
          echo "$RESPONSE"
