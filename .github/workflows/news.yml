name: AI News Auto-Poster

on:
  schedule:
    # প্রতি ৩ ঘণ্টা পরপর চলবে (UTC সময় অনুযায়ী) — প্রয়োজনমতো পরিবর্তন করুন
    - cron: "0 */3 * * *"
  workflow_dispatch:  # GitHub থেকে ম্যানুয়ালি "Run workflow" চাপলে AI প্রোভাইডার বেছে নেওয়া যাবে
    inputs:
      provider:
        description: "কোন AI দিয়ে সামারি/ক্যাপশন বানাতে হবে"
        required: false
        default: "gemini"
        type: choice
        options:
          - gemini
          - claude

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: রিপো চেকআউট করা হচ্ছে
        uses: actions/checkout@v4

      - name: Python সেটআপ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pip install -r requirements.txt

      - name: বট চালানো (সব ক্যাটাগরি)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --category all --provider "${{ github.event.inputs.provider || 'gemini' }}"

      - name: seen_items.json ও Facebook পোস্ট কমিট করা
        run: |
          git config user.name "AI News Bot"
          git config user.email "actions@github.com"
          git add seen_items.json facebook_posts.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Auto: নতুন খবর পোস্ট করা হয়েছে [skip ci]"
          git push
