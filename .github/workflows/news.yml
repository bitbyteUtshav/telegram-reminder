name: AI News Auto-Poster

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "কোন AI দিয়ে সামারি/ক্যাপশন বানাতে হবে"
        required: false
        default: "gemini"
        type: choice
        options:
          - gemini
          - claude

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: রিপো চেকআউট করা হচ্ছে
        uses: actions/checkout@v4

      - name: Python সেটআপ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ডিপেন্ডেন্সি ইনস্টল
        run: pip install -r requirements.txt

      - name: বট চালানো (সব ক্যাটাগরি)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --category all --provider "${{ github.event.inputs.provider || 'gemini' }}"

      - name: seen_items.json ও Facebook পোস্ট কমিট করা
        run: |
          git config user.name "AI News Bot"
          git config user.email "actions@github.com"
          git add seen_items.json facebook_posts.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Auto: নতুন খবর পোস্ট করা হয়েছে [skip ci]"
          git push
